    <style>
        /* ===== Dua Container ===== */
        .dua-wrapper {
            position: fixed;
            bottom: 0; /* الالتصاق بالأسفل */
            left: 0;
            right: 0; /* لضمان التمدد من اليمين لليسار */

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            box-sizing: border-box;
            opacity: 1;
            transform: translateY(30px);
            /*transition: opacity 1s ease, transform 1s ease;*/
        }

            .dua-wrapper.visible {
                opacity: 1;
                transform: translateY(0);
            }

        /* Category Label */
        .category-label {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(180, 140, 30, 0.8);
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* The Dua Text */
        #Zeker {
            font-family: 'Amiri', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            line-height: 2;
            text-align: center;
            max-width: 800px;
            color: #1a1a1a;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.08);
            margin-bottom: 40px;
            padding: 0 20px;
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #b4881e, transparent);
            margin-bottom: 30px;
        }

        /* Transliteration */
        .transliteration {
            font-style: italic;
            font-size: 1rem;
            color: rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 600px;
            margin-bottom: 20px;
            line-height: 1.8;
            padding: 0 20px;
        }

        /* Translation */
        .translation {
            font-size: 1.05rem;
            color: rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 600px;
            line-height: 1.9;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        /* Source */
        .source {
            font-size: 0.8rem;
            color: rgba(0, 0, 0, 0.4);
            text-align: center;
            margin-bottom: 8px;
        }

        /* Repeat badge */
        .repeat {
            font-size: 0.75rem;
            color: rgba(180, 140, 30, 0.8);
            background: rgba(212, 175, 55, 0.08);
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 50px;
        }

        /* Refresh Button */
        .refresh-btn {
            background: transparent;
            border: 1px solid rgba(180, 140, 30, 0.3);
            color: #b4881e;
            padding: 12px 32px;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .refresh-btn:hover {
                background: rgba(212, 175, 55, 0.08);
                border-color: rgba(180, 140, 30, 0.6);
                transform: translateY(-2px);
                box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
            }

            .refresh-btn:active {
                transform: translateY(0);
            }

            .refresh-btn.spinning svg {
                animation: spinIcon 0.8s linear infinite;
            }

        @keyframes spinIcon {
            to {
                transform: rotate(360deg);
            }
        }

        /* Subtle background glow */
        .glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.04) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        }

        .menu-item.active .chevron-icon {
            transform: rotate(180deg);
        }

        .chevron-icon {
            transition: transform 0.2s ease-in-out;
        }

    <script>
        window.BlazorDownloadFile = (fileName, contentType, bytes) => {
            const blob = new Blob([new Uint8Array(bytes)], { type: contentType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        };
    </script>

    <script>
        // 1. مصفوفة الأرقام التي تريد استثناءها (مثلاً: 5, 10, 20)
        const excludedIds = [67,71,115,111,110,109,101,103,106];

        function getRandomId(min, max, exclusions) {
            let random;
            do {
                // توليد رقم عشوائي بين min و max
                random = Math.floor(Math.random() * (max - min + 1)) + min;

                // الاستمرار في التوليد طالما أن الرقم موجود في مصفوفة الاستثناءات
            } while (exclusions.includes(random));

            return random;
        }

        // 2. الحصول على الرقم العشوائي المطلوب
        const randomId = getRandomId(1, 126, excludedIds);
        console.info(`Selected random ID: ${randomId}`);

        // 3. دمج الرقم العشوائي في الرابط باستخدام Template Literals
        const API_URL = `https://ummahapi.com/api/duas/${randomId}`;
                //const API_URL = 'https://ummahapi.com/api/duas/1';
        const wrapper = document.getElementById('dua-wrapper');

        async function fetchDua() {
            var readingTime = 2000; // وقت افتراضي للقراءة (10 ثواني)
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network error');

                const result = await response.json();
                if (!result.success || !result.data) throw new Error('Invalid data');

                const data = result.data;
                const catInfo = data.category_info || {};

                document.getElementById('category').textContent = catInfo.name || data.category || '';
                document.getElementById('Zeker').textContent = data.arabic || '';
                document.getElementById('source').textContent = data.source ? '📖 ' + data.source : '';
                document.getElementById('repeat').textContent = data.repeat ? 'التكرار: ' + data.repeat + ' مرات' : '';
                document.getElementById('No').textContent = 'رقم الذكر (' +randomId + ')';
                wrapper.classList.add('visible');

                const wordCount = data.arabic.split(/\s+/).filter(w => w).length;
                readingTime = Math.max(2000, Math.min(15000, wordCount * 200));

            } catch (err) {
                console.error(err);
                document.getElementById('Zeker').textContent = '❌ حدث خطأ في تحميل الدعاء';
                document.getElementById('source').textContent = '';
                document.getElementById('repeat').textContent = '';
                document.getElementById('category').textContent = 'خطأ';
                wrapper.classList.add('visible');
            }
            finally {
                // تحميل Blazor بعد عرض الذكر (نجاح أو فشل)
                //loadBlazor();
                

                setTimeout(() => {
                    Blazor.start();
                }, 2000);
            }
        }

        // تأخير تحميل Blazor حتى يتم جلب الدعاء وعرضه

        //        document.body.appendChild(mudScript);

        //        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
        //    };
        //    document.body.appendChild(script);
        //}
